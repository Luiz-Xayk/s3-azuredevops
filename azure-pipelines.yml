trigger:
  branches:
    include:
      - main

pool:
  name: Default

variables:
  TF_VERSION: "1.7.5"
  TF_WORKING_DIR: "$(System.DefaultWorkingDirectory)/terraform"
  AWS_DEFAULT_REGION: "us-east-1"

stages:
  - stage: Validate
    displayName: "Terraform Validate & Format"
    jobs:
      - job: TerraformValidate
        displayName: "Validate Terraform Code"
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: "Install Terraform $(TF_VERSION)"
            inputs:
              terraformVersion: $(TF_VERSION)

          - pwsh: terraform init -backend=false
            displayName: "Terraform Init (no backend)"
            workingDirectory: $(TF_WORKING_DIR)
            env:
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
              AWS_DEFAULT_REGION: $(AWS_DEFAULT_REGION)

          - pwsh: terraform validate
            displayName: "Terraform Validate"
            workingDirectory: $(TF_WORKING_DIR)

          - pwsh: terraform fmt -check -recursive
            displayName: "Terraform Format Check"
            workingDirectory: $(TF_WORKING_DIR)

  - stage: Plan
    displayName: "Terraform Plan"
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: TerraformPlan
        displayName: "Generate Terraform Plan"
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: "Install Terraform $(TF_VERSION)"
            inputs:
              terraformVersion: $(TF_VERSION)

          - pwsh: terraform init
            displayName: "Terraform Init"
            workingDirectory: $(TF_WORKING_DIR)
            env:
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
              AWS_DEFAULT_REGION: $(AWS_DEFAULT_REGION)

          - pwsh: terraform plan -out=tfplan -var="environment=dev"
            displayName: "Terraform Plan"
            workingDirectory: $(TF_WORKING_DIR)
            env:
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
              AWS_DEFAULT_REGION: $(AWS_DEFAULT_REGION)

          - publish: $(TF_WORKING_DIR)/tfplan
            artifact: terraform-plan
            displayName: "Publish Plan Artifact"

  - stage: Apply
    displayName: "Terraform Apply"
    dependsOn: Plan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: TerraformApply
        displayName: "Apply Terraform Plan"
        environment: "production"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - download: current
                  artifact: terraform-plan
                  displayName: "Download Plan Artifact"

                - task: TerraformInstaller@1
                  displayName: "Install Terraform $(TF_VERSION)"
                  inputs:
                    terraformVersion: $(TF_VERSION)

                - pwsh: terraform init
                  displayName: "Terraform Init"
                  workingDirectory: $(TF_WORKING_DIR)
                  env:
                    AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
                    AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
                    AWS_DEFAULT_REGION: $(AWS_DEFAULT_REGION)

                - pwsh: terraform apply "$(Pipeline.Workspace)/terraform-plan/tfplan"
                  displayName: "Terraform Apply"
                  workingDirectory: $(TF_WORKING_DIR)
                  env:
                    AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
                    AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
                    AWS_DEFAULT_REGION: $(AWS_DEFAULT_REGION)
