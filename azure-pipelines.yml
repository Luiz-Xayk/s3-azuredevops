trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  TF_VERSION: "1.7.5"
  TF_WORKING_DIR: "$(System.DefaultWorkingDirectory)/terraform"
  AWS_DEFAULT_REGION: "us-east-1"

stages:
  - stage: Validate
    displayName: "Terraform Validate & Format"
    jobs:
      - job: TerraformValidate
        displayName: "Validate Terraform Code"
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: "Install Terraform $(TF_VERSION)"
            inputs:
              terraformVersion: $(TF_VERSION)

          - task: AWSShellScript@1
            displayName: "Terraform Init (no backend)"
            inputs:
              awsCredentials: "aws-s3-test"
              regionName: $(AWS_DEFAULT_REGION)
              scriptType: inline
              inlineScript: cd $BUILD_SOURCESDIRECTORY && terraform init -backend=false

          - script: terraform validate
            displayName: "Terraform Validate"

          - script: terraform fmt -recursive
            displayName: "Terraform Format"

  - stage: Plan
    displayName: "Terraform Plan"
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: TerraformPlan
        displayName: "Generate Terraform Plan"
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: "Install Terraform $(TF_VERSION)"
            inputs:
              terraformVersion: $(TF_VERSION)

          - task: AWSShellScript@1
            displayName: "Terraform Init"
            inputs:
              awsCredentials: "aws-s3-test"
              regionName: $(AWS_DEFAULT_REGION)
              scriptType: inline
              inlineScript: cd $BUILD_SOURCESDIRECTORY && terraform init

          - task: AWSShellScript@1
            displayName: "Terraform Plan"
            inputs:
              awsCredentials: "aws-s3-test"
              regionName: $(AWS_DEFAULT_REGION)
              scriptType: inline
              inlineScript: cd $BUILD_SOURCESDIRECTORY && terraform plan -out=tfplan -var="environment=dev"

          - publish: $(System.DefaultWorkingDirectory)/tfplan
            artifact: terraform-plan
            displayName: "Publish Plan Artifact"

  - stage: Apply
    displayName: "Terraform Apply"
    dependsOn: Plan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: TerraformApply
        displayName: "Apply Terraform Plan"
        environment: "production"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - download: current
                  artifact: terraform-plan
                  displayName: "Download Plan Artifact"

                - task: TerraformInstaller@1
                  displayName: "Install Terraform $(TF_VERSION)"
                  inputs:
                    terraformVersion: $(TF_VERSION)

                - task: AWSShellScript@1
                  displayName: "Terraform Init"
                  inputs:
                    awsCredentials: "aws-s3-test"
                    regionName: $(AWS_DEFAULT_REGION)
                    scriptType: inline
                    inlineScript: cd $BUILD_SOURCESDIRECTORY && terraform init

                - task: AWSShellScript@1
                  displayName: "Terraform Apply"
                  inputs:
                    awsCredentials: "aws-s3-test"
                    regionName: $(AWS_DEFAULT_REGION)
                    scriptType: inline
                    inlineScript: cd $BUILD_SOURCESDIRECTORY && terraform apply "$(Pipeline.Workspace)/terraform-plan/tfplan"
